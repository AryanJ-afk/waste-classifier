<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Waste Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
            background: #f7f7f7;
            color: #222;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
        }

        form {
            margin-top: 20px;
        }

        input[type="file"] {
            margin-bottom: 16px;
        }

        button {
            background: #111;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .result {
            margin-top: 24px;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 10px;
        }

        .muted {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Waste Classification</h1>
        <p class="muted">Upload an image to predict: cardboard, glass, metal, paper, plastic, or trash.</p>

        <form action="/predict" method="post" enctype="multipart/form-data">
    <input type="file" name="file" accept="image/*" required />
    <br /><br />

    <label for="model_type"><strong>Select Model:</strong></label>
    <select name="model_type" id="model_type" required>
        <option value="cnn">CNN</option>
        <option value="transformer">Transformer</option>
    </select>

    <br /><br />
    <button type="submit">Predict</button>
</form>

        {% if prediction %}
        <div class="result">
            <p><strong>File:</strong> {{ filename }}</p>
            <p><strong>Model Used:</strong> {{ model_used }}</p>
            <p><strong>Predicted Class:</strong> {{ prediction }}</p>
            <p><strong>Confidence:</strong> {{ confidence }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
